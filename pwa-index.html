body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}

svg text{font-family:-apple-system,sans-serif}

// === SMART JOURNAL FEEDBACK ===
function getSmartFB(jT,journals,habits){
const fb=[];const a=(jT.accomplished||"").toLowerCase(),r=(jT.roadblocks||"").toLowerCase(),t=(jT.tomorrow||"").toLowerCase();
const rc=[];for(let i=1;i<=3;i++){const d2=new Date();d2.setDate(d2.getDate()-i);const k=dk(d2);if(journals[k])rc.push(journals[k])}
const rr=rc.map(j=>(j.roadblocks||"").toLowerCase()).join(" ");
const dc=(rr.match(/distract|phone|screen|scroll/g)||[]).length;
if(!jT.accomplished||jT.accomplished.trim().length<10)fb.push({t:"w",m:"Log 3+ accomplishments."});
if(/distract|phone|screen|scroll/.test(r))fb.push({t:"a",m:dc>=2?"🔴 PATTERN: Screens 3+ days. DELETE social apps this week.":"Phone → another room during study."});
if(/tired|sleep|fatigue/.test(r))fb.push({t:"a",m:"Fatigue → midnight bedtime. All 3 meals."});
if(/motivat|lazy|procrastinat/.test(r))fb.push({t:"a",m:"Low motivation → 2-min rule. Start Pomodoro."});
if(/confus|stuck|hard/.test(r))fb.push({t:"a",m:"Knowledge wall → office hours this week."});
const hab=habits[td()]||{};
if(hab.exercise&&!/exercise/.test(a))fb.push({t:"g",m:"Exercise logged in habits ✓"});
const next=DATES.find(x=>x.d>=td());
if(next){const dy=Math.ceil((new Date(next.d+"T23:59:59")-new Date())/(864e5));if(dy<=2)fb.push({t:"a",m:`⚠️ ${next.n} ${dy===0?"TODAY":dy===1?"TOMORROW":"in 2d"}`})}
const jKeys=Object.keys(journals).sort().reverse();
const lastLI=jKeys.find(k=>/linkedin|post/.test((journals[k].accomplished||"").toLowerCase()));
const daysSinceLI=lastLI?Math.floor((new Date()-new Date(lastLI+"T12:00:00"))/(864e5)):99;
if(daysSinceLI>=14)fb.push({t:"a",m:"📱 "+daysSinceLI+"+ days since LinkedIn post. Time for a Project Showcase or Industry Insight!"});
if(/job|apply|resume|linkedin/.test(a))fb.push({t:"g",m:"Career work done."});
if(/sql|python|power bi/.test(a))fb.push({t:"g",m:"Skill building ✓"});
if(!/study|homework|assignment|class/.test(a))fb.push({t:"w",m:"No academic work logged."});
if(!t||t.length<10)fb.push({t:"w",m:"Set #1 for tomorrow."});
if(!fb.length)fb.push({t:"g",m:"Solid day."});return fb;}

// === CHART ===
function MiniChart({data,color,label,h=55,w=260}){
if(!data||!data.length)return null;const max=Math.max(...data.map(d=>d.v),1);
const pts=data.map((d,i)=>[i*(w-40)/(Math.max(data.length-1,1))+20,h-8-(d.v/max)*(h-22)]);
return<svg viewBox={`0 0 ${w} ${h+10}`} style={{width:"100%",maxWidth:w}}>
<text x={w/2} y={9} textAnchor="middle" fontSize="8" fill="var(--muted)" fontWeight="600">{label}</text>
<polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={color} strokeWidth="1.5"/>
{pts.map((p,i)=><g key={i}><circle cx={p[0]} cy={p[1]} r="2.5" fill={color}/><text x={p[0]} y={p[1]-5} textAnchor="middle" fontSize="6" fill="var(--text)">{data[i].v}</text><text x={p[0]} y={h+7} textAnchor="middle" fontSize="5" fill="var(--faint)">{data[i].l}</text></g>)}</svg>}

{/* BUDGET */}
{tab==="budget"&&<div><h2>Budget</h2>
{(()=>{const inc=budget.filter(b=>b.type==="income").reduce((s,b)=>s+Number(b.amount),0),exp=budget.filter(b=>b.type==="expense").reduce((s,b)=>s+Number(b.amount),0);return<div style={{display:"flex",gap:4,marginBottom:6}}>{[["Income","#16a34a",inc],["Expenses","#dc2626",exp],["Balance",inc-exp>=0?"#16a34a":"#dc2626",inc-exp]].map(([l,c,v])=><div key={l} className="cd" style={{flex:1,textAlign:"center"}}><div style={{fontSize:9,color:"var(--muted)"}}>{l}</div><div style={{fontSize:16,fontWeight:700,color:c}}>${v.toFixed(0)}</div></div>)}</div>})()}
<div className="cd"><div style={{display:"flex",gap:3,flexWrap:"wrap"}}><select className="sl" value={bForm.type} onChange={e=>setBForm({...bForm,type:e.target.value})}><option value="income">Income</option><option value="expense">Expense</option></select><input className="ip" placeholder="Category" value={bForm.category} onChange={e=>setBForm({...bForm,category:e.target.value})} style={{flex:"1 1 60px"}}/><input className="ip" type="number" placeholder="$" value={bForm.amount} onChange={e=>setBForm({...bForm,amount:e.target.value})} style={{width:55}}/><button className="bt" style={{background:"#3b82f6"}} onClick={()=>{if(bForm.amount){const nb=[{...bForm,id:Date.now(),date:td()},...budget];setBudget(nb);DB.s("budget",nb);setBForm({type:"expense",category:"",amount:""})}}}>Add</button></div></div>
{budget.slice(0,15).map((b,i)=><div key={b.id} style={{display:"flex",justifyContent:"space-between",fontSize:10,padding:"3px 0",borderBottom:"1px solid var(--light)"}}><span><span style={{color:b.type==="income"?"#16a34a":"#dc2626",fontWeight:600}}>{b.type==="income"?"+":"-"}${b.amount}</span> {b.category}</span><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:8,color:"var(--faint)"}}>{b.date}</span><button style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer"}} onClick={()=>{const nb=budget.filter((_,j)=>j!==i);setBudget(nb);DB.s("budget",nb)}}>✕</button></div></div>)}
<div className="sc" style={{background:"#fefce8",border:"1px solid #fde68a",marginTop:6}}><div style={{fontSize:10,fontWeight:600,color:"#92400e"}}>Upcoming cert costs:</div><div style={{fontSize:9,color:"#78350f"}}>ECBA ~$450-650 | CAPM ~$260 | PL-300 ~$165 | Data+ ~$250</div></div></div>}

{/* NOTES */}
{tab==="notes"&&<div><h2>Brain Dump</h2>
<div className="cd"><textarea className="ip" placeholder="Ideas, tasks, random thoughts..." value={noteText} onChange={e=>setNoteText(e.target.value)} rows={3} style={{resize:"vertical",marginBottom:3}}/><button className="bt" style={{background:"#3b82f6"}} onClick={()=>{if(noteText.trim()){const nn=[{text:noteText,date:td(),id:Date.now()},...notes];setNotes(nn);DB.s("notes",nn);setNoteText("")}}}>Save Note</button></div>
{notes.map((n,i)=><div key={n.id} className="cd" style={{padding:6}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:8,color:"var(--faint)"}}>{n.date}</span><button style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:9}} onClick={()=>{const nn=notes.filter((_,j)=>j!==i);setNotes(nn);DB.s("notes",nn)}}>✕</button></div><div style={{fontSize:10,marginTop:2,whiteSpace:"pre-wrap"}}>{n.text}</div></div>)}</div>}

{/* RESOURCES */}
{tab==="res"&&<div><h2>Resources</h2>
{RES.map((r,i)=><div key={i} className="cd"><h3 style={{color:"#1e40af"}}>{r.c}</h3>{r.i.map((x,j)=><div key={j} style={{fontSize:10,padding:"2px 0"}}>{x}</div>)}</div>)}
<h3 style={{marginTop:6}}>Commute Learning</h3>
{[{d:"Mon AM",s:"BA875 flashcards"},{d:"Mon PM",s:"Career podcast"},{d:"Tue AM",s:"BA870 flashcards"},{d:"Wed AM",s:"Preview BA875 slides"},{d:"Thu AM",s:"SQL mental practice"},{d:"Fri AM",s:"Preview BA870"}].map((c,i)=><div key={i} style={{fontSize:10,padding:"3px 0",borderBottom:"1px solid var(--light)"}}><b style={{color:"#8b5cf6"}}>{c.d}:</b> {c.s}</div>)}</div>}

{/* CERTS */}
{tab==="certs"&&<div><h2>Certifications</h2>
{[{nm:"IIBA ECBA",p:"May–Jul",cl:"#3b82f6",d:"21 PD hrs from EEP. Gold standard BA cert.",k:"ecba",req:21},
{nm:"PMI CAPM",p:"Jul–Sep",cl:"#8b5cf6",d:"23 PM education hrs. #1 entry PM cert.",k:"capm",req:23},
{nm:"Microsoft PL-300",p:"Oct–Nov",cl:"#ec4899",d:"Power BI. Free training on MS Learn.",k:"",req:0},
{nm:"CompTIA Data+",p:"Dec–Jan",cl:"#f59e0b",d:"Vendor-neutral. CompTIA certified.",k:"",req:0}
].map((c,i)=><div key={i} className="cd" style={{borderLeft:"4px solid "+c.cl}}>
<div style={{display:"flex",justifyContent:"space-between"}}><h3>{i+1}. {c.nm}</h3><span style={{fontSize:9,color:c.cl,fontWeight:600}}>{c.p}</span></div>
<div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{c.d}</div>
{c.req>0&&<div style={{marginTop:4}}>
<div style={{display:"flex",justifyContent:"space-between",fontSize:10}}><span>Study hours</span><span style={{fontWeight:700,color:c.cl}}>{certHrs[c.k]||0}/{c.req}h</span></div>
<div style={{height:6,background:"var(--light)",borderRadius:3,marginTop:3,overflow:"hidden"}}><div style={{height:"100%",background:c.cl,width:Math.min(100,((certHrs[c.k]||0)/c.req)*100)+"%"}}/></div>
<div style={{display:"flex",gap:3,marginTop:4}}>{[1,2,3].map(h=><button key={h} className="bt" style={{background:c.cl}} onClick={()=>{const nc={...certHrs,[c.k]:(certHrs[c.k]||0)+h};setCertHrs(nc);DB.s("certhrs",nc)}}>+{h}h</button>)}</div></div>}
</div>)}</div>}

{/* JOURNAL LOG */}
{tab==="log"&&<div><h2>Journal History</h2>
{Object.keys(journals).sort().reverse().map(jdk=>{const j=journals[jdk];return<div key={jdk} className="cd"><b style={{fontSize:10}}>{fmt(new Date(jdk+"T12:00:00"))}</b>
{j.accomplished&&<div style={{fontSize:10,marginTop:2}}>✅ {j.accomplished}</div>}
{j.roadblocks&&<div style={{fontSize:10}}>🚧 {j.roadblocks}</div>}
{j.tomorrow&&<div style={{fontSize:10}}>🎯 {j.tomorrow}</div>}</div>})}</div>}

{/* SETTINGS */}
{tab==="set"&&<div><h2>Settings</h2>
<div className="cd"><h3>🌙 Dark Mode</h3><button className="bt" style={{background:dark?"#f59e0b":"#1e293b",padding:"6px 14px"}} onClick={()=>{const nd=!dark;setDark(nd);DB.s("dark",nd)}}>{dark?"☀️ Switch to Light":"🌙 Switch to Dark"}</button></div>
<div className="cd"><h3>"Why" Statement</h3><div style={{fontSize:9,color:"var(--muted)",marginBottom:3}}>Shows at the top every time you open the app</div><textarea className="ip" value={whyText} onChange={e=>{setWhyText(e.target.value);DB.s("why",e.target.value)}} rows={2}/></div>
<div className="cd"><h3>Backup & Restore</h3><div style={{fontSize:9,color:"var(--muted)",marginBottom:4}}>Export weekly (Sunday planning). Import on other devices.</div><div style={{display:"flex",gap:4}}><button className="bt" style={{background:"#10b981",padding:"6px 14px"}} onClick={exportAll}>📥 Export All Data</button><label className="bt" style={{background:"#3b82f6",padding:"6px 14px",cursor:"pointer"}}>📤 Import Backup<input type="file" accept=".json" onChange={importAll} style={{display:"none"}}/></label></div></div>
<div className="cd"><h3>Data Summary</h3><div style={{fontSize:10,color:"var(--muted)",lineHeight:1.8}}>Journals: {Object.keys(journals).length} · Apps: {apps.length} · Network: {nets.length} · Budget: {budget.length} · Notes: {notes.length} · Study logs: {studyLog.length} · Grades: {(grades.ba875?.hw?.length||0)+(grades.ba870?.tests?.length||0)}</div></div>
<div className="sc" style={{background:"#fef2f2",border:"1px solid #fecaca"}}><div style={{fontSize:10,fontWeight:600,color:"#991b1b",marginBottom:4}}>⚠ Danger Zone</div><button className="bt" style={{background:"#dc2626"}} onClick={()=>{if(confirm("Delete ALL data? This cannot be undone. Export first!")){Object.keys(localStorage).filter(k=>k.startsWith("v9-")).forEach(k=>localStorage.removeItem(k));location.reload()}}}>Delete Everything</button></div></div>}
</div>}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Register service worker for PWA
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
